name: "Create or update comment"
description: "Action to create or update comment in pull request or issue."
author: hoverkraft
branding:
  icon: message-square
  color: blue

inputs:
  title:
    description: |
      The comment title.
      Must be static and unique, will be used to retrieve the comment if exists already.
    required: true
  body:
    description: |
      The comment body.
      See https://github.com/peter-evans/create-or-update-comment.
    required: false
  reactions:
    description: |
      A comma separated list of reactions to add to the comment.
      See https://github.com/peter-evans/create-or-update-comment.
    required: false
  comment-author:
    description: "The comment author."
    required: false
    default: "github-actions[bot]"
  token:
    description: |
      Optional token to interact with GitHub API.
      If not defined or empty, the action will use the GITHUB_TOKEN provided by GitHub.
    required: false

runs:
  using: "composite"
  steps:
    # FIXME: This is a workaround until this issue is resolved: https://github.com/actions/runner/issues/1348.
    - name: Prepare sibling actions
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      with:
        script: |
          const path = require('node:path');

          const sourcePath = path.resolve(process.env.GITHUB_ACTION_PATH, '..');
          const destinationPath = path.resolve(process.env.GITHUB_WORKSPACE, '..', 'self-actions');

          await io.rmRF(destinationPath);
          await io.mkdirP(destinationPath);
          await io.cp(sourcePath, destinationPath, {
            recursive: true,
            copySourceDirectory: false,
          });

    - id: get-issue-number
      uses: ./../self-actions/get-issue-number

    - uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4.0.0
      id: find-comment
      with:
        issue-number: ${{ steps.get-issue-number.outputs.issue-number }}
        comment-author: ${{ inputs.comment-author }}
        body-includes: ${{ inputs.title }}
        token: ${{ inputs.token || github.token }}

    - uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        edit-mode: replace
        comment-id: ${{ steps.find-comment.outputs.comment-id }}
        issue-number: ${{ steps.get-issue-number.outputs.issue-number }}
        body: |
          ${{ inputs.title }}

          ${{ inputs.body }}
        reactions: ${{ inputs.reactions }}
        token: ${{ inputs.token || github.token }}

    - name: Cleanup sibling actions
      if: ${{ always() }}
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      with:
        script: |
          const path = require('node:path');

          await io.rmRF(path.resolve(process.env.GITHUB_WORKSPACE, '..', 'self-actions'));
