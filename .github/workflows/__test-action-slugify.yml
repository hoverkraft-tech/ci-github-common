name: Internal - Tests for slugify action

on:
  workflow_call:

permissions:
  contents: read

jobs:
  tests:
    name: Tests for slugify action
    runs-on: ubuntu-latest
    steps:
      - name: Arrange - Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Act - Run slugify action
        id: slugify
        uses: ./actions/slugify
        with:
          value: test content

      - name: Assert - Check slugify outputs
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          STEPS_SLUGIFY_OUTPUTS_RESULT: ${{ steps.slugify.outputs.result }}
        with:
          script: |
            const assert = require('node:assert/strict');
            const result = process.env.STEPS_SLUGIFY_OUTPUTS_RESULT;

            try {
              assert.strictEqual(result, 'test-content', 'Slugify outputs result is not valid');
            } catch (error) {
              core.setFailed(error.message);
              return;
            }
